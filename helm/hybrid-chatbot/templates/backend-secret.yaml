{{- if .Values.backend.secrets.LITELLM_API_KEY }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-backend-secrets
  labels:
    {{- include "hybrid-chatbot.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
type: Opaque
data:
  litellm-api-key: {{ .Values.backend.secrets.LITELLM_API_KEY | b64enc | quote }}
{{- end }}
