replicaCount: 1

image:
  backend:
    repository: elevy99927/hybrid-ai-aiml-chat-backend
    pullPolicy: IfNotPresent
    tag: "dev-28"
  frontend:
    repository: elevy99927/hybrid-ai-aiml-chat-frontend
    pullPolicy: IfNotPresent
    tag: "dev-28"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Custom labels to add to all resources
customLabels: 
  project: hybrid-bot
  # example: "value"
  # team: "platform"
  # environment: "production"

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  backend:
    type: ClusterIP  # Options: ClusterIP (internal only), LoadBalancer (external IP), NodePort (node port access)
    port: 3011
  frontend:
    type: ClusterIP  # Options: ClusterIP (internal only), LoadBalancer (external IP), NodePort (node port access)
    port: 3010

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chatbot.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  backend:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
  frontend:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

autoscaling:
  backend:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
  frontend:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Backend environment variables
backend:
  env:
    LITELLM_BASE_URL: "http://lite-helm-litellm.lite-llm.svc.cluster.local:4000"
    LITELLM_MODEL: "eu.anthropic.claude-sonnet-4-5-20250929-v1:0"
    LITELLM_MAX_CONTEXT_TOKENS: "3000"  # Maximum tokens for conversation history (sliding window removes oldest messages when exceeded)
    LITELLM_MAX_COMPLETION_TOKENS: "250"  # Maximum tokens for LLM response generation (limits response length)
    LITELLM_SYSTEM_PROMPT: "You are a helpful and friendly chatbot assistant. Answer questions naturally and conversationally. You can discuss any topic the user asks about."
    LLMLINGUA_MODEL: "microsoft/llmlingua-2-bert-base-multilingual-cased-meetingbank"
    LLMLINGUA_DEVICE: "cpu"
    DEBUG_LLMLINGUA: "true"
    DEBUG: "true"
  secrets:
    LITELLM_API_KEY: "sk-uNkngIaEglGI5HojaGQ4hQ"  # Set via --set or secrets

# Persistence for AIML brain files (optional)
persistence:
  enabled: false
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi
