version: '3.8'

services:
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    ports:
      - "3011:3011"
    environment:
      - LITELLM_BASE_URL=http://host.docker.internal:8080
      - LITELLM_API_KEY=sk-uNkngIaEglGI5HojaGQ4hQ
      - LITELLM_MODEL=eu.amazon.nova-2-lite-v1:0
                     ## OLD working models 
                     #gemini/gemini-2.0-flash-lite-001
                     #gemini/gemini-2.5-flash-lite 
                     #gemini-3-flash-preview
      - LITELLM_MAX_CONTEXT_TOKENS=3000
      - LITELLM_MAX_COMPLETION_TOKENS=250
      - LLMLINGUA_MODEL=microsoft/llmlingua-2-bert-base-multilingual-cased-meetingbank
      - LLMLINGUA_DEVICE=cpu
      - DEBUG_LLMLINGUA=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      args:
        - VITE_BACKEND_URL=http://localhost:3011
    ports:
      - "3010:3010"
    environment:
      - VITE_BACKEND_URL=http://localhost:3011
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: aiml-network
    external: false
